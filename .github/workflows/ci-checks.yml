name: CI Checks Before Deploying to Render (Backend + Frontend)

on:
  push:
    branches: ["main"]
    
  pull_request:
    branches: ["main"]
  workflow_dispatch:


jobs:
  backend-tests:
    name: Backend Tests (Pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pip-audit

      - name: Run backend tests with coverage
        run: |
          pytest helpdeskapp --cov=helpdeskapp --cov-report=term-missing

      - name: Python dependency audit
        run: |
          pip-audit

  frontend-tests:
    name: Frontend Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: helpdeskapp/static/package-lock.json

      - name: Install frontend dependencies
        working-directory: helpdeskapp/static
        run: |
          npm ci

      - name: Run frontend tests
        working-directory: helpdeskapp/static
        run: |
          npm test -- --ci --passWithNoTests

      - name: Frontend dependency audit (high and critical)
        working-directory: helpdeskapp/static
        run: |
          npm audit --audit-level=high