{% extends "base.html" %} {% block title %}Sign up{% endblock%}

{% block content %}
<!-- Signup page: User registration form -->
<form method="POST">
  <br />
  <h3 align="center">Sign up for the Help Desk App</h3>
  <!-- Username field -->
  <div class="form-group">
    <label for="username">User Name</label>
    <input
      type="text"
      class="form-control"
      id="username"
      name="username"
      placeholder="Enter a user name"
    />
  </div>
  <!-- First name field -->
  <div class="form-group">
    <label for="first_name">First Name</label>
    <input
      type="text"
      class="form-control"
      id="first_name"
      name="first_name"
      placeholder="Enter your first name"
    />
  </div>
  <!-- Password fields -->
  <div class="form-group">
    <label for="password">Password</label>
    <input
      type="password"
      class="form-control"
      id="password"
      name="password"
      minlength="12"
      autocomplete="new-password"
      placeholder="Enter a password"
    />
    <small class="form-text text-muted"
      >Use 12+ characters with uppercase, lowercase, a number, and a special
      character.</small
    >
  </div>
  <div class="form-group">
    <label for="passwordConfirm">Password (Confirm)</label>
    <input
      type="password"
      class="form-control"
      id="passwordConfirm"
      name="passwordConfirm"
      minlength="12"
      autocomplete="new-password"
      placeholder="Confirm password"
    />
  </div>
  <!-- Department selection (optional) -->
  <div class="form-group">
    <label for="department_name">Department (optional)</label>
    <select class="custom-select" name="department_name" id="department_name">
      <option value="" selected disabled>Select a Department</option>
      <option value="Consulting">Consulting</option>
      <option value="Business">Business</option>
      <option value="HR">HR</option>
      <option value="Finance">Finance</option>
      <option value="Marketing">Marketing</option>
      <option value="Facilities">Facilities</option>
      <option value="Resourcing">Resourcing</option>
    </select>
  </div>
  <small class="form-text text-muted"
    >New accounts are created as standard users. Admin access is assigned
    separately.</small
  >
  <br />
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
<br /><br /><br />
<!-- Link to login page for existing users -->
<button>
  <a href="{{ url_for('auth.login') }}">Already have an account? Login here</a>
</button>
{% endblock %}
